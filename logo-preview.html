<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body{margin:0;font-family:Inter,system-ui,sans-serif;display:flex;gap:40px;padding:48px;background:#6B6B6B;align-items:flex-start;flex-wrap:wrap;justify-content:center}
  .card{padding:40px;border-radius:16px;display:flex;flex-direction:column;align-items:center}
  .cream{background:#F5F0EB}
  .ink{background:#1A1A1A}
  .label{font:600 11px 'JetBrains Mono',monospace;letter-spacing:2px;margin:0 0 16px;opacity:.6}
  .cream .label{color:#6B6258}.ink .label{color:#C8A96E}
</style>
</head>
<body>
  <div class="card cream">
    <div class="label">ON CREAM (light background)</div>
    <svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Minh Tùng Studio">
      <rect x="14" y="22" width="136" height="136" rx="30" fill="#1A1A1A"/>
      <path d="M55 56 A27 27 0 0 1 109 56" fill="none" stroke="#C8A96E" stroke-width="5.5" stroke-linecap="round"/>
      <rect x="44" y="56" width="76" height="64" rx="10" fill="#C8A96E"/>
      <line x1="52" y1="64" x2="112" y2="64" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.3"/>
      <rect x="53" y="90" width="58" height="30" rx="7" fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.22"/>
      <line x1="62" y1="100" x2="102" y2="100" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <circle cx="102" cy="100" r="2.5" fill="#1A1A1A" opacity="0.4"/>
      <path d="M58 60 C46 75 44 90 48 108" fill="none" stroke="#C8A96E" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
      <path d="M106 60 C118 75 120 90 116 108" fill="none" stroke="#C8A96E" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
      <text x="176" y="74" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="0.5" fill="#1A1A1A">MINH TÙNG</text>
      <text x="176" y="108" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="2.5" fill="#C8A96E">STUDIO</text>
      <text x="178" y="131" font-family="'JetBrains Mono',monospace" font-size="10.5" letter-spacing="2" fill="#6B6258">OEM BAG MANUFACTURER · VIETNAM</text>
    </svg>
  </div>

  <div class="card ink">
    <div class="label">ON INK (dark background)</div>
    <svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Minh Tùng Studio">
      <rect x="14" y="22" width="136" height="136" rx="30" fill="#FFFFFF" opacity="0.06"/>
      <rect x="14" y="22" width="136" height="136" rx="30" fill="none" stroke="#C8A96E" stroke-width="2"/>
      <path d="M55 56 A27 27 0 0 1 109 56" fill="none" stroke="#C8A96E" stroke-width="5.5" stroke-linecap="round"/>
      <rect x="44" y="56" width="76" height="64" rx="10" fill="#C8A96E"/>
      <line x1="52" y1="64" x2="112" y2="64" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.3"/>
      <rect x="53" y="90" width="58" height="30" rx="7" fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.25"/>
      <line x1="62" y1="100" x2="102" y2="100" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <circle cx="102" cy="100" r="2.5" fill="#1A1A1A" opacity="0.45"/>
      <path d="M58 60 C46 75 44 90 48 108" fill="none" stroke="#C8A96E" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
      <path d="M106 60 C118 75 120 90 116 108" fill="none" stroke="#C8A96E" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
      <text x="176" y="74" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="0.5" fill="#F5F0EB">MINH TÙNG</text>
      <text x="176" y="108" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="2.5" fill="#C8A96E">STUDIO</text>
      <text x="178" y="131" font-family="'JetBrains Mono',monospace" font-size="10.5" letter-spacing="2" fill="#C8A96E" opacity="0.75">OEM BAG MANUFACTURER · VIETNAM</text>
    </svg>
  </div>
</body>
</html>
